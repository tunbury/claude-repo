name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, linux, x64, day10]
    steps:
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory '*'

      - name: Checkout claude-repo
        uses: actions/checkout@v4

      - name: Checkout opam-repository
        uses: actions/checkout@v4
        with:
          repository: ocaml/opam-repository
          path: opam-repository

      - name: Download previous results
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous-results
          # Find the most recent completed run (excluding current)
          run_id=$(gh run list --repo ${{ github.repository }} \
            --branch main --workflow "CI Build" --status completed \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$run_id" ]; then
            echo "Downloading results from run $run_id"
            gh run download "$run_id" --repo ${{ github.repository }} \
              --name build-results --dir previous-results || true
          else
            echo "No previous run found"
          fi

      - name: Install day10
        run: |
          sudo curl -sL https://github.com/mtelvers/day10/releases/download/v0.0.1/day10-linux-x86_64 -o /usr/local/bin/day10
          sudo chmod +x /usr/local/bin/day10

      - name: List packages
        run: |
          day10 list \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json packages.json

      - name: Solve packages (dry-run)
        run: |
          mkdir -p results
          day10 health-check \
            --cache-dir /var/cache/day10 \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json results \
            --dry-run \
            --fork 256 \
            @packages.json

      - name: Build packages
        run: |
          day10 health-check \
            --cache-dir /var/cache/day10 \
            --opam-repository opam-repository \
            --opam-repository . \
            --ocaml-version ocaml.5.4.1 \
            --os-distribution ubuntu --os-family debian --os-version 24.04 \
            --json results \
            --fork 64 \
            @packages.json

      - name: Generate summary
        if: always()
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total=0; success=0; failed=0; no_solution=0; dep_failed=0
          for f in results/*.json; do
            [ -f "$f" ] || continue
            total=$((total + 1))
            s=$(jq -r '.status' "$f")
            case "$s" in
              success) success=$((success + 1)) ;;
              failure) failed=$((failed + 1)) ;;
              no_solution) no_solution=$((no_solution + 1)) ;;
              dependency_failed) dep_failed=$((dep_failed + 1)) ;;
            esac
          done

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total packages | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| :white_check_mark: Success | $success |" >> $GITHUB_STEP_SUMMARY
          echo "| :x: Failed | $failed |" >> $GITHUB_STEP_SUMMARY
          echo "| :warning: No solution | $no_solution |" >> $GITHUB_STEP_SUMMARY
          echo "| :fast_forward: Dependency failed | $dep_failed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$failed" -gt 0 ]; then
            echo "<details><summary>Failed packages ($failed)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Log (last 5 lines) |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
            for f in results/*.json; do
              [ -f "$f" ] || continue
              s=$(jq -r '.status' "$f")
              if [ "$s" = "failure" ]; then
                name=$(jq -r '.name' "$f")
                log=$(jq -r '.log // ""' "$f" | tail -5 | sed 's/|/\\|/g' | tr '\n' ' ')
                echo "| \`$name\` | \`$log\` |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          # Diff against previous results
          if ls previous-results/*.json 1>/dev/null 2>&1; then
            echo "## Changes from previous run" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            newly_fixed=""
            newly_broken=""
            newly_added=""
            newly_removed=""

            # Check current results against previous
            for f in results/*.json; do
              [ -f "$f" ] || continue
              name=$(jq -r '.name' "$f")
              cur=$(jq -r '.status' "$f")
              prev_file="previous-results/$(basename "$f")"
              if [ -f "$prev_file" ]; then
                prev=$(jq -r '.status' "$prev_file")
                if [ "$prev" != "success" ] && [ "$cur" = "success" ]; then
                  newly_fixed="$newly_fixed\n- \`$name\` ($prev -> success)"
                elif [ "$prev" = "success" ] && [ "$cur" != "success" ]; then
                  newly_broken="$newly_broken\n- \`$name\` (success -> $cur)"
                fi
              else
                newly_added="$newly_added\n- \`$name\` ($cur)"
              fi
            done

            # Check for removed packages
            for f in previous-results/*.json; do
              [ -f "$f" ] || continue
              name=$(jq -r '.name' "$f")
              cur_file="results/$(basename "$f")"
              if [ ! -f "$cur_file" ]; then
                prev=$(jq -r '.status' "$f")
                newly_removed="$newly_removed\n- \`$name\` (was $prev)"
              fi
            done

            has_changes=false
            if [ -n "$newly_broken" ]; then
              has_changes=true
              echo ":rotating_light: **Newly broken:**" >> $GITHUB_STEP_SUMMARY
              echo -e "$newly_broken" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "$newly_fixed" ]; then
              has_changes=true
              echo ":tada: **Newly fixed:**" >> $GITHUB_STEP_SUMMARY
              echo -e "$newly_fixed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "$newly_added" ]; then
              has_changes=true
              echo ":new: **New packages:**" >> $GITHUB_STEP_SUMMARY
              echo -e "$newly_added" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "$newly_removed" ]; then
              has_changes=true
              echo ":wastebasket: **Removed packages:**" >> $GITHUB_STEP_SUMMARY
              echo -e "$newly_removed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$has_changes" = false ]; then
              echo "No changes from previous run." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "$success" -gt 0 ]; then
            echo "<details><summary>Successful packages ($success)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for f in results/*.json; do
              [ -f "$f" ] || continue
              s=$(jq -r '.status' "$f")
              if [ "$s" = "success" ]; then
                name=$(jq -r '.name' "$f")
                echo "- \`$name\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: results/
